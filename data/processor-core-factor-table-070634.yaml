# Oracle Processor Core Factor Table (document 070634)
# Source: https://www.oracle.com/contracts/docs/processor-core-factor-table-070634.pdf
# Effective: 2009-03-16; Updated: 2026-01-28
#
# match_pattern is matched as a case-insensitive substring of the reported CPU model.
# Higher priority wins when multiple patterns match. is_default is the fallback.

source_url: https://www.oracle.com/contracts/docs/processor-core-factor-table-070634.pdf
document_id: processor-core-factor-table-070634
