site_name: Oracle License Tracker
site_description: Track Oracle license agreements, product entitlements, and host CPU inventory.

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - User guide: user-guide.md
  - Docker: docker.md
  - Configuration: configuration.md
  - Oracle catalog: catalog.md
  - API reference: api.md
  - Development: development.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true
